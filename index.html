<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Image Gallery</title>
<style>
:root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; }
body { margin:0; font-family:system-ui; background:var(--bg); color:white; }
header { text-align:center; padding:18px; font-size:28px; font-weight:700; }
.container { max-width:1200px; margin:auto; }

.search-bar { display:flex; justify-content:center; padding:10px; gap:10px; }
input, select {
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

.slideshow {
  width:95%; height:400px; margin:20px auto;
  border-radius:16px; overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,.6);
}
.slideshow img { width:100%; height:100%; object-fit:cover; }

.gallery {
  column-count:4; column-gap:15px; padding:20px;
}
@media(max-width:1000px){ .gallery{column-count:3;} }
@media(max-width:700px){ .gallery{column-count:2;} }
@media(max-width:500px){ .gallery{column-count:1;} }

.card {
  background:var(--card);
  border-radius:14px;
  margin-bottom:15px;
  overflow:hidden;
  break-inside: avoid;
  position:relative;
}
.card img { width:100%; display:block; }

.actions {
  position:absolute; bottom:10px; left:10px;
  display:flex; gap:6px;
}
button {
  background:var(--accent);
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* SAVED GALLERY */
.saved-section { padding:20px; }
.saved-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}
.saved-grid img {
  width:100%; height:150px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

.modal {
  position:fixed; inset:0;
  background:rgba(0,0,0,.95);
  display:none; justify-content:center; align-items:center;
}
.modal img { max-width:95%; max-height:95%; }

.loader { text-align:center; padding:20px; }
</style>
</head>
<body>
<div class="container">
<header>📌 Image Gallery</header>

<div class="search-bar">
  <input id="search" placeholder="Search images..." />
  <select id="category">
    <option value="nature">Nature</option>
    <option value="technology">Tech</option>
    <option value="cars">Cars</option>
    <option value="animals">Animals</option>
     <option value="flowers">Flowers</option>
    <option value="fruits">Fruits</option>
  </select>
</div>

<div class="slideshow">
  <img id="slideImg" />
</div>

<div class="gallery" id="gallery"></div>
<div class="loader" id="loader">Loading...</div>

<h2 style="padding-left:20px">⭐ Saved Gallery</h2>
<div class="saved-section">
  <div class="saved-grid" id="savedGrid"></div>
</div>

</div>

<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg" />
</div>

<script>
const ACCESS_KEY = 'wBuzKdKjcSXU-k0ceMN4MHpUUbZF353ojiv31PbXBaY';
let images = [];
let page = 1;
let query = 'nature';
let loading = false;
let slideIndex = 0;
let slideTimer;
let debounceTimer;

async function fetchImages(reset=false) {
  if(loading) return;
  loading = true;
  document.getElementById('loader').style.display='block';

  if(reset) {
    images = [];
    page = 1;
    document.getElementById('gallery').innerHTML='';
  }

  try {
    const res = await fetch(`https://api.unsplash.com/search/photos?query=${query}&page=${page}&per_page=20&client_id=${ACCESS_KEY}`);
    const data = await res.json();

    if(!data || !Array.isArray(data.results)) return;

    const newImages = data.results.map(img => img.urls.regular);
    images = [...images, ...newImages];

    render(newImages);
    startSlideshow();
    page++;

  } catch(e) {
    console.error(e);
  }

  loading = false;
  document.getElementById('loader').style.display='none';
}

function startSlideshow() {
  clearInterval(slideTimer);
  const top = images.slice(0,5);
  if(top.length === 0) return;

  slideIndex = 0;
  slideTimer = setInterval(()=>{
    document.getElementById('slideImg').src = top[slideIndex];
    slideIndex = (slideIndex + 1) % top.length;
  }, 2500);
}

function render(newImgs) {
  const g = document.getElementById('gallery');

  newImgs.forEach(url => {
    const div = document.createElement('div');
    div.className='card';
    div.innerHTML=`
      <img src="${url}" onclick="openModal('${url}')" />
      <div class="actions">
        <button onclick="saveImage('${url}')">💾</button>
        <button onclick="downloadImage('${url}')">⬇</button>
      </div>
    `;
    g.appendChild(div);
  });
}

// SAVE SYSTEM (FIXED)
function saveImage(url) {
  let saved = JSON.parse(localStorage.getItem('saved')||'[]');
  if(!saved.includes(url)) saved.push(url);
  localStorage.setItem('saved', JSON.stringify(saved));
  loadSaved();
}

function loadSaved() {
  const saved = JSON.parse(localStorage.getItem('saved')||'[]');
  const grid = document.getElementById('savedGrid');
  grid.innerHTML='';

  saved.forEach(url => {
    const img = document.createElement('img');
    img.src = url;
    img.onclick = () => openModal(url);
    grid.appendChild(img);
  });
}

window.addEventListener('scroll', () => {
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    fetchImages();
  }
});

function openModal(url) {
  document.getElementById('modal').style.display='flex';
  document.getElementById('modalImg').src=url;
}
function closeModal() {
  document.getElementById('modal').style.display='none';
}

async function downloadImage(url) {
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'image.jpg';
    link.click();
  } catch(e) {
    console.error(e);
  }
}

// search
const searchEl = document.getElementById('search');
searchEl.addEventListener('input', e=>{
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(()=>{
    query = e.target.value || 'nature';
    fetchImages(true);
  }, 500);
});

// category
const categoryEl = document.getElementById('category');
categoryEl.addEventListener('change', e=>{
  query = e.target.value;
  fetchImages(true);
});

// tests
function runTests() {
  console.assert(Array.isArray(images), 'Images should be array');
  console.assert(document.getElementById('savedGrid'), 'Saved grid exists');
}

loadSaved();
fetchImages();
setTimeout(runTests, 2000);
</script>
</body>
</html>
